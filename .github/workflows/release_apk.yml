name: Publish APK to Releases

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Download APK
        run: |
          wget -O byedpi.apk "https://github.com/dovecoteescapee/ByeDPIAndroid/releases/download/v1.2.0/byedpi-1.2.0.apk"

      - name: Create Release and Upload Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.2.0 byedpi.apk \
            --title "ByeDPI v1.2.0 (Pre-built)" \
            --notes "این نسخه به‌طور خودکار از مخزن اصلی دریافت و در این ریپازیتوری منتشر شده است."
